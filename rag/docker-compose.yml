# FILE: docker-compose.yml
# ROLE: Neo4j 최신 버전(v5+) 설정 오류 해결 및 M4 Pro 환경 최적화
# FIX: 설정값 명칭 오류(dbms.memory...) 수정 및 엄격한 검증 우회 설정 추가

version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: todays_meal_db
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123
      # 최신 버전에서는 아래와 같은 명칭 형식을 권장합니다.
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_config_strict__validation_enabled=false # 설정 오류 시 즉시 중단 방지
    restart: always