name: Modeling Docker Build

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "ai/modeling/**"
      - "Dockerfile.modeling"
      - "docker-compose.modeling.yml"
      - "ai/modeling/deploy/docker-compose.ec2.yml"
      - "ai/modeling/deploy/scripts/**"
      - ".dockerignore"
      - ".env.modeling.example"
      - ".github/workflows/modeling-docker-build.yml"

  push:
    branches:
      - "feat/modeling-*"
    paths:
      - "ai/modeling/**"
      - "Dockerfile.modeling"
      - "docker-compose.modeling.yml"
      - "ai/modeling/deploy/docker-compose.ec2.yml"
      - "ai/modeling/deploy/scripts/**"
      - ".dockerignore"
      - ".env.modeling.example"
      - ".github/workflows/modeling-docker-build.yml"

jobs:
  modeling-docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Modeling deployment scripts
        run: |
          set -Eeuo pipefail

          bash -n ai/modeling/deploy/scripts/deploy_from_ghcr.sh
          bash -n ai/modeling/deploy/scripts/test_deploy_from_ghcr.sh
          bash ai/modeling/deploy/scripts/test_deploy_from_ghcr.sh

      - name: Build Modeling Docker image
        run: |
          docker build \
            -f Dockerfile.modeling \
            -t todays-ggini-modeling:ci \
            .

      - name: Verify RAG error status mapping
        run: |
          docker run --rm \
            todays-ggini-modeling:ci \
            python ai/modeling/tests/api/test_modeling_api_rag_error_status.py

      - name: Verify Modeling API contracts
        run: |
          docker run --rm \
            -e MODELING_API_KEY=ci-secret-key \
            todays-ggini-modeling:ci \
            sh -c "
              python -m pip install \
                --no-cache-dir \
                --target /tmp/modeling-test-deps \
                -r ai/modeling/requirements-test.txt &&
              PYTHONPATH=/tmp/modeling-test-deps:/app/ai/modeling \
                python -m pytest -q -p no:cacheprovider \
                ai/modeling/tests/api/test_modeling_api_request_validation.py \
                ai/modeling/tests/api/test_modeling_api_metrics.py \
                ai/modeling/tests/contract/test_optimizer_failure_response_contract.py &&
              PYTHONPATH=/app/ai/modeling \
                python ai/modeling/experiments/contract/validate_backend_contract_requests.py &&
              PYTHONPATH=/app/ai/modeling \
                python ai/modeling/experiments/contract/validate_backend_contract_responses.py
            "

      - name: Run Modeling container
        run: |
          docker run -d \
            --name todays-ggini-modeling-ci \
            -e MODELING_API_KEY=ci-secret-key \
            -p 8001:8000 \
            todays-ggini-modeling:ci

      - name: Wait for Modeling API health
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8001/health > /tmp/modeling_health_response.json; then
              cat /tmp/modeling_health_response.json
              exit 0
            fi

            echo "Modeling API healthcheck 대기 중 (${i}/20)"
            sleep 1
          done

          docker logs todays-ggini-modeling-ci
          exit 1

      - name: Validate health response
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/modeling_health_response.json").read_text())

          assert data["status"] == "ok"
          assert data["service"] == "todays-ggini-modeling"
          assert "env" not in data

          print("health response ok")
          PY

      - name: Verify Prometheus metrics endpoint
        run: |
          set -Eeuo pipefail

          http_status="$(
            curl -sS \
              -o /tmp/modeling_metrics_response.txt \
              -D /tmp/modeling_metrics_headers.txt \
              -w "%{http_code}" \
              http://localhost:8001/metrics \
              -H "X-API-Key: ci-secret-key"
          )"

          cat /tmp/modeling_metrics_headers.txt
          head -40 /tmp/modeling_metrics_response.txt
          echo "http_status=${http_status}"

          test "${http_status}" = "200"

          grep -qi \
            '^content-type: text/plain' \
            /tmp/modeling_metrics_headers.txt

          grep -q \
            '^# HELP modeling_http_requests_total ' \
            /tmp/modeling_metrics_response.txt

          grep -q \
            '^# HELP modeling_http_request_duration_seconds ' \
            /tmp/modeling_metrics_response.txt

          grep -q \
            '^# HELP modeling_http_requests_in_progress ' \
            /tmp/modeling_metrics_response.txt

          if grep -q \
            'path="/metrics"' \
            /tmp/modeling_metrics_response.txt; then
            echo "::error::/metrics 요청이 자체 HTTP 지표에 포함되었습니다."
            exit 1
          fi

          if grep -q \
            'path="/health"' \
            /tmp/modeling_metrics_response.txt; then
            echo "::error::/health 요청이 비즈니스 HTTP 지표에 포함되었습니다."
            exit 1
          fi

          echo "Prometheus metrics endpoint 검증을 통과했습니다."

      - name: Verify metrics API key protection
        run: |
          set -Eeuo pipefail

          http_status="$(
            curl -sS \
              -o /tmp/modeling_metrics_wrong_key_response.json \
              -w "%{http_code}" \
              http://localhost:8001/metrics \
              -H "X-API-Key: wrong-key"
          )"

          cat /tmp/modeling_metrics_wrong_key_response.json
          echo "http_status=${http_status}"

          test "${http_status}" = "401"

          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(
              Path(
                  "/tmp/modeling_metrics_wrong_key_response.json"
              ).read_text(encoding="utf-8")
          )

          assert data == {
              "detail": "Invalid or missing API key.",
          }

          print("metrics API key protection ok")
          PY

      - name: Verify API key protection
        run: |
          http_status="$(
            curl -s -o /tmp/modeling_wrong_key_response.json \
              -w "%{http_code}" \
              -X POST http://localhost:8001/monthly-plan \
              -H "Content-Type: application/json" \
              -H "X-API-Key: wrong-key" \
              --data-binary \
              @ai/modeling/experiments/fixtures/backend_monthly_plan_request.json
          )"

          cat /tmp/modeling_wrong_key_response.json
          echo "http_status=${http_status}"

          test "${http_status}" = "401"

      - name: Verify docs are disabled in prod mode
        run: |
          http_status="$(
            curl -s -o /tmp/modeling_docs_response.html \
              -w "%{http_code}" \
              http://localhost:8001/docs
          )"

          echo "http_status=${http_status}"

          test "${http_status}" = "404"

      - name: Run Modeling API HTTP smoke test
        run: |
          docker run --rm \
            --network host \
            todays-ggini-modeling:ci \
            python ai/modeling/experiments/contract/run_modeling_api_http_smoke.py \
              --base-url http://127.0.0.1:8001 \
              --api-key ci-secret-key \
              --timeout 30 \
              --skip-monthly

      - name: Stop Modeling container
        if: always()
        run: |
          docker logs todays-ggini-modeling-ci || true
          docker stop todays-ggini-modeling-ci || true
