name: Modeling Docker Publish

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "ai/modeling/**"
      - "Dockerfile.modeling"
      - "docker-compose.modeling.yml"
      - ".dockerignore"
      - ".env.modeling.example"
      - ".github/workflows/modeling-docker-publish.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/todays-ggini-modeling

jobs:
  modeling-docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tags=${IMAGE_NAME}:latest,${IMAGE_NAME}:main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE_NAME}:develop-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Modeling Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.modeling
          push: true
          tags: ${{ steps.meta.outputs.tags }}
