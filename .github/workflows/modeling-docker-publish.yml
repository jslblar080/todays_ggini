name: Modeling Docker Publish

on:
  workflow_dispatch:

  push:
    paths:
      - "modeling/**"
      - "modeling/deploy/**"
      - "Dockerfile.modeling"
      - "docker-compose.modeling.yml"
      - ".dockerignore"
      - ".env.modeling.example"
      - ".github/workflows/modeling-docker-publish.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/todays-ggini-modeling

jobs:
  modeling-docker-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${IMAGE_NAME}:latest,${IMAGE_NAME}:main-${SHORT_SHA}"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            TAGS="${IMAGE_NAME}:develop-${SHORT_SHA}"
          else
            SAFE_BRANCH="$(
              printf '%s' "${GITHUB_REF_NAME}" \
                | tr '[:upper:]' '[:lower:]' \
                | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##'
            )"

            TAGS="${IMAGE_NAME}:branch-${SAFE_BRANCH}-${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Modeling Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.modeling
          push: true
          tags: ${{ steps.meta.outputs.tags }}
