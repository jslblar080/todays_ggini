name: todaysggini
description: 스마트 영양 & 예산 플래너
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.0.0
  dio: ^5.9.2
  intl: ^0.20.2
  url_launcher: ^6.3.1

  # 소셜 로그인
  kakao_flutter_sdk_user: ^1.9.0
  google_sign_in: ^6.2.0
  google_sign_in_web: ^0.12.4+4
  flutter_web_auth_2: ^4.0.0       # 네이버

  # 토큰 로컬 저장
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.2.3
  image_picker: ^1.2.2
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/start.png"

flutter:

  uses-material-design: true

  # mock JSON을 asset 으로 등록
  assets:
    - assets/mocks/users/
    - assets/mocks/meal-plans/
    - assets/mocks/menus/
    - assets/mocks/ingredients/
    - assets/mocks/shopping-list/
    - assets/images/
    - assets/images/onboarding/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
          weight: 400
        - asset: assets/fonts/Pretendard-SemiBold.ttf
          weight: 600
    - family: MemomentKkukkukk
      fonts:
        - asset: assets/fonts/MemomentKkukkukk.ttf
          weight: 400