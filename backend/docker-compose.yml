services:
  # 데이터베이스 (PostgreSQL)
  postgres:
    image: postgres:16
    container_name: kkini-postgres
    environment:
      POSTGRES_USER: admin            # backend/.env 의 DATABASE_URL 과 일치
      POSTGRES_PASSWORD: admin1234    # 실제 배포 시에는 더 강력한 비밀번호를 설정해야함
      POSTGRES_DB: todays_kkini_db
    # ports:
    #   - "127.0.0.1:5432:5432"         # 로컬에서만 접근 (외부 노출 차단)
    volumes:
      - kkini-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d todays_kkini_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - kkini-network

  # 인메모리 저장소 (Redis)
  redis:
    image: redis:7
    container_name: kkini-redis
    # ports:
    #   - "127.0.0.1:6379:6379"         # 앱 토큰 저장 + Celery 브로커/백엔드 공용
    volumes:
      - kkini-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - kkini-network

  # 백엔드 애플리케이션 (FastAPI + AI 모델링 엔진)
  backend:
    build:
      context: ..                     # Dockerfile이 위치한 프로젝트 루트 경로
      dockerfile: backend/Dockerfile          # 백엔드 빌드용 도커파일 명시
    container_name: kkini-backend
    restart: unless-stopped
    env_file:
      - .env                          # 운영 서버 환경 변수 파일 (.env) 로드
    volumes:
      - ..:/app                        # 실시간 코드 동기화 (필요 시)
      - /home/ubuntu/data/images:/app/app/static/images # 유저 이미지 업로드 경로를 리눅스 절대 경로로 마운트
    depends_on:
      postgres:
        condition: service_healthy    # DB가 완전히 켜져서 ready 상태일 때 백엔드 가동
      redis:
        condition: service_healthy    # redis가 health check 통과하면 백엔드 가동
    networks:
      - kkini-network

  # 웹 서버 및 역방향 프록시 (Nginx)
  nginx:
    image: nginx:stable-alpine
    container_name: kkini-nginx
    ports:
      - "80:80"                       # 일반 웹 통신 (HTTP)
      - "443:443"                     # 웹앱/모바일 통신 필수 (HTTPS 보안망)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Nginx 설정 파일 마운트
      - /home/ubuntu/data/images:/app/static/images:ro # 백엔드가 저장한 정적 이미지 파일을 Nginx가 직접 고속 서빙
      - ./certbot/conf:/etc/letsencrypt             # Certbot(SSL 인증서) 연동을 위한 볼륨 경로
      - ./certbot/www:/var/www/certbot         
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kkini-network

  # SSL 인증서 자동 발급 및 갱신을 담당하는 Certbot 엔진
  certbot:
    image: certbot/certbot
    container_name: kkini-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - kkini-network

  celery_worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: kkini-celery-worker
    working_dir: /app/backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kkini-network

# 데이터 유실 방지를 위한 네임드 볼륨 설정
volumes:
  kkini-pgdata:
  kkini-redisdata:

# 컨테이너 간 격리된 안전한 내부 네트워크망 구축
networks:
  kkini-network:
    driver: bridge
