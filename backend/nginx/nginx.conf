user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/log/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 포맷 설정
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log main;

    sendfile        on;
    keepalive_timeout  65;

    # 🎯 [중요] 웹앱에서 식단 사진이나 프로필 이미지 업로드 시 용량 제한 해제
    # 기본값이 1MB라 이 설정을 안 하면 큰 사진을 올릴 때 413 Payload Too Large 에러가 납니다.
    client_max_body_size 50M;

    # Gzip 압축 설정 (웹앱 데이터 전송 속도 향상)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API 서버 라우팅 설정
    server {
        listen 80;
        server_name localhost; # 추후 클라우드 배포 시 api.todays-ggini.com 같은 도메인으로 교체됩니다.

        # 백엔드 API 요청 라우팅 (/api 또는 /docs 등 백엔드로 가는 경로)
        location / {
            proxy_pass http://kkini-backend:8000; # 도커 내부 네트워크로 FastAPI 컨테이너 지정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 🎯 웹앱 하이브리드 통신을 위한 CORS 헤더 추가 (필요 시)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # [성능 최적화] 유저가 업로드한 정적 이미지 파일 고속 서빙
        # FastAPI 서버를 거치지 않고 Nginx가 리눅스 하드디스크에서 바로 유저에게 이미지를 쏴줍니다.
        location /static/images/ {
            alias /app/static/images/;
            expires 7d; # 브라우저 캐싱 7일 설정
            access_log off;
        }
    }
}