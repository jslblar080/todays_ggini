user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/log/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로그 포맷 설정
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access_log main;

    sendfile        on;
    keepalive_timeout  65;

    # [중요] 웹앱에서 식단 사진이나 프로필 이미지 업로드 시 용량 제한 해제
    # 기본값이 1MB라 이 설정을 안 하면 큰 사진을 올릴 때 413 Payload Too Large 에러가 납니다.
    client_max_body_size 50M;

    # Gzip 압축 설정 (웹앱 데이터 전송 속도 향상)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 1. HTTP (Port 80) 설정: HTTPS로 강제 리다이렉트
    server {
        listen 80;
        server_name todays-ggini.shop api.todays-ggini.shop;

        # Let's Encrypt 자동 갱신 검증 경로만 오픈
        location ~/.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 그 외 모든 HTTP 요청은 HTTPS로 자동 튕겨줌
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS (Port 443) 설정: 보안 API 서버 구동
    server {
        listen 443 ssl;
        server_name todays-ggini.shop api.todays-ggini.shop;

        # 발급받은 SSL 인증서 파일 경로 매핑
        ssl_certificate /etc/letsencrypt/live/todays-ggini.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/todays-ggini.shop/privkey.pem;

        # SSL 보안 옵션 최적화
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 백엔드 API 요청 라우팅
        location / {
            proxy_pass http://kkini-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 유저 업로드 정적 이미지 고속 서빙
        location /static/images/ {
            alias /app/static/images/;
            expires 7d;
            access_log off;
        }
    }
}